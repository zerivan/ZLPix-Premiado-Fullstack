<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZLPIX PREMIADO - Login &amp; Cadastro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2b2bee",
              "background-light": "#f6f6f8",
              "background-dark": "#101022",
              "brand-green": "#00C853",
              "text-light": "#333333",
              "text-dark": "#E0E0E0",
              "text-dark-muted": "#BDBDBD",
              "border-dark": "#323267",
              "surface-dark": "#191933",
            },
            fontFamily: {
              "display": ["Spline Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col dark group/design-root overflow-x-hidden antialiased">
<main class="flex flex-col items-center justify-center w-full max-w-md mx-auto px-4 py-8">
<h1 class="text-text-light dark:text-white tracking-light text-3xl font-bold leading-tight text-center pb-2 pt-6">ZLPIX PREMIADO</h1>
<p class="text-text-light/80 dark:text-text-dark/80 text-base font-normal leading-normal pb-6 text-center">Bem-vindo! Acesse sua conta ou crie uma nova para começar a ganhar.</p>
<!-- Segmented Buttons -->
<div class="flex w-full px-4 py-3">
<div class="flex h-12 flex-1 items-center justify-center rounded-full bg-background-light dark:bg-surface-dark p-1 shadow-inner-lg">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-background-dark has-[:checked]:shadow-md has-[:checked]:text-text-light dark:has-[:checked]:text-white text-text-light/70 dark:text-text-dark-muted text-sm font-medium leading-normal transition-colors duration-300">
<span class="truncate">Login</span>
<input class="invisible w-0" name="auth-toggle" type="radio" value="Login"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-background-dark has-[:checked]:shadow-md has-[:checked]:text-text-light dark:has-[:checked]:text-white text-text-light/70 dark:text-text-dark-muted text-sm font-medium leading-normal transition-colors duration-300">
<span class="truncate">Cadastro</span>
<input checked="" class="invisible w-0" name="auth-toggle" type="radio" value="Cadastro"/>
</label>
</div>
</div>
<!-- Signup Form -->
<div class="w-full">
<h2 class="text-text-light dark:text-white tracking-light text-2xl font-bold leading-tight px-4 text-left pb-3 pt-5">Crie sua Conta</h2>
<div class="flex flex-col gap-4 px-4 py-3">
<!-- Nome Completo -->
<label class="flex flex-col">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">Nome Completo</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<div class="text-text-dark-muted flex border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined">person</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-lg text-text-light dark:text-white focus:outline-0 focus:ring-2 focus:ring-brand-green/50 border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark focus:border-brand-green/80 h-14 placeholder:text-text-dark-muted p-4 text-base font-normal leading-normal" placeholder="Digite seu nome completo"/>
</div>
</label>
<!-- E-mail -->
<label class="flex flex-col">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">E-mail</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<div class="text-text-dark-muted flex border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined">mail</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-lg text-text-light dark:text-white focus:outline-0 focus:ring-2 focus:ring-brand-green/50 border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark focus:border-brand-green/80 h-14 placeholder:text-text-dark-muted p-4 text-base font-normal leading-normal" placeholder="seuemail@exemplo.com" type="email"/>
</div>
</label>
<!-- Telefone -->
<label class="flex flex-col">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">Telefone</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<div class="text-text-dark-muted flex border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined">call</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-lg text-text-light dark:text-white focus:outline-0 focus:ring-2 focus:ring-brand-green/50 border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark focus:border-brand-green/80 h-14 placeholder:text-text-dark-muted p-4 text-base font-normal leading-normal" placeholder="(00) 90000-0000" type="tel"/>
</div>
</label>
<!-- Chave Pix -->
<label class="flex flex-col">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">Chave Pix</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<div class="text-text-dark-muted flex border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined">photos</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-lg text-text-light dark:text-white focus:outline-0 focus:ring-2 focus:ring-brand-green/50 border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark focus:border-brand-green/80 h-14 placeholder:text-text-dark-muted p-4 text-base font-normal leading-normal" placeholder="Sua chave para receber prêmios"/>
</div>
</label>
<!-- Senha -->
<label class="flex flex-col">
<p class="text-text-light dark:text-text-dark text-sm font-medium leading-normal pb-2">Senha</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<div class="text-text-dark-muted flex border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark items-center justify-center pl-4 rounded-l-lg border-r-0">
<span class="material-symbols-outlined">key</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-text-light dark:text-white focus:outline-0 focus:ring-2 focus:ring-brand-green/50 border border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark focus:border-brand-green/80 h-14 placeholder:text-text-dark-muted p-4 text-base font-normal leading-normal pr-12" placeholder="Crie uma senha forte" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-text-dark-muted cursor-pointer">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
</div>
</div>
<div class="px-4 py-4 w-full">
<button class="flex h-14 w-full items-center justify-center gap-x-2 rounded-lg bg-brand-green px-6 text-base font-bold text-white shadow-lg transition-transform duration-200 ease-in-out hover:scale-[1.02] focus:outline-none focus:ring-4 focus:ring-brand-green/50">Criar Conta</button>
</div>
<div class="w-full px-4 pt-4">
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer">
<input class="form-checkbox h-5 w-5 rounded border-gray-300 dark:border-border-dark bg-background-light dark:bg-surface-dark text-brand-green focus:ring-brand-green/50" type="checkbox"/>
<span class="text-sm text-text-light dark:text-text-dark">Lembrar-me</span>
</label>
<a class="text-sm font-medium text-brand-green hover:underline" href="#">Esqueci a senha</a>
</div>
</div>
<div class="text-center pt-8 pb-4">
<p class="text-xs text-text-light/60 dark:text-text-dark-muted">Ao continuar, você concorda com nossos</p>
<a class="text-xs font-medium text-brand-green hover:underline" href="#">Termos de Uso</a>
<span class="text-xs text-text-light/60 dark:text-text-dark-muted"> e </span>
<a class="text-xs font-medium text-brand-green hover:underline" href="#">Política de Privacidade</a>.
            </div>
</main>
</div>
</body></html>
