<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZLPIX PREMIADO - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFD700",
                        "background-light": "#f5f5f5",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col items-center justify-center p-4">
<div class="flex w-full max-w-sm flex-col items-center gap-6">
<!-- Logo -->
<div class="flex w-full justify-center">
<div class="w-48 h-auto flex justify-center items-center">
<img class="w-full h-auto object-contain" data-alt="Logotipo do ZLPIX PREMIADO com um Z estilizado e as palavras ZLPIX e PREMIADO" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmzrE-Lxoj0vhBEQ06zXmsjgkqYG5YBlM1M9_v6HQ4R4pBfd3yVEEpnp5XPqZRHsJ6dWz1JuQc02890lsQdUljWDlvoMImtzkLgrs2rfv3QL-NrsYiDAzqkXhSdT8rRM9Qu4lphwOalWJNxxBix-212vwFBaU03M53Jrbx14xLnkofjbeXCG_e18RNUcOeh3Cl6sQoV0aDgBHDCX3qM0OG6PFoATVuZ5ban3RA7_evH4W8Qm3m3rKyvSn-shgPw2K9K306pNEzHak"/>
</div>
</div>
<!-- Headline -->
<div class="text-center">
<h1 class="text-slate-900 dark:text-white text-3xl font-bold tracking-tight">Bem-vindo de volta!</h1>
<p class="text-slate-600 dark:text-slate-300 text-base font-normal mt-2">Faça seu login para continuar</p>
</div>
<!-- Form -->
<div class="flex w-full flex-col gap-4">
<!-- E-mail Field -->
<div class="flex w-full flex-col">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-200 text-sm font-medium pb-2">E-mail</p>
<div class="relative flex w-full items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 dark:text-slate-500">mail</span>
<input class="form-input flex w-full flex-1 resize-none overflow-hidden rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 pl-12 pr-4 text-base font-normal" placeholder="seuemail@exemplo.com" type="email" value=""/>
</div>
</label>
</div>
<!-- Password Field -->
<div class="flex w-full flex-col">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-200 text-sm font-medium pb-2">Senha</p>
<div class="relative flex w-full items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 dark:text-slate-500">lock</span>
<input class="form-input flex w-full flex-1 resize-none overflow-hidden rounded-lg border border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 pl-12 pr-4 text-base font-normal" placeholder="Sua senha" type="password" value=""/>
</div>
</label>
</div>
<!-- Remember me & Forgot Password -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="form-checkbox h-5 w-5 rounded border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 text-primary focus:ring-primary focus:ring-offset-background-light dark:focus:ring-offset-background-dark" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-300">Lembrar-me</span>
</label>
<a class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">Esqueci a Senha</a>
</div>
<!-- Login Button -->
<button class="flex h-14 w-full items-center justify-center rounded-lg bg-primary text-slate-900 font-bold text-base transition-transform active:scale-95">Entrar</button>
</div>
<!-- Sign Up Link -->
<div class="text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                    Não tem uma conta?
                    <a class="font-bold text-primary hover:underline" href="#">Cadastre-se agora</a>
</p>
</div>
</div>
</div>
</body></html>
