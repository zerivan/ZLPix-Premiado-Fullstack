<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ZLPix Premiado</title>

    <meta name="description" content="ZLPix Premiado — selecione suas dezenas, pague com Pix e concorra a prêmios reais com resultados baseados na extração oficial da Loteria Federal." />
    <meta name="theme-color" content="#0ea5e9" />

    <style>
      /* Container da frase */
      .hero {
        text-align: center;
        margin-top: 80px;
        font-family: 'Manrope', sans-serif;
      }

      /* Animação principal: fade-in suave */
      .fade-in {
        animation: fadeIn 1.8s ease forwards;
        opacity: 0;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-15px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Glow leve e elegante */
      .glow {
        color: #0ea5e9;
        text-shadow: 0 0 12px rgba(14, 165, 233, 0.5);
      }

      /* Shine effect (luz passando no texto) */
      .shine {
        position: relative;
        overflow: hidden;
        display: inline-block;
      }

      .shine::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 80%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent 0%,
          rgba(255, 255, 255, 0.4) 50%,
          transparent 100%
        );
        animation: shineMove 2.8s infinite;
      }

      @keyframes shineMove {
        from { left: -100%; }
        to   { left: 120%; }
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <div id="root"></div>

    <!-- HERO com animação -->
    <div class="hero fade-in">
      <h1 class="shine glow" style="font-size: 1.8rem; font-weight: 800;">
        ZLPix Premiado — selecione suas dezenas, pague com Pix e concorra a prêmios reais com resultados baseados na extração oficial da Loteria Federal.
      </h1>
    </div>

    <!-- React/Vite -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
