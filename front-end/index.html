    <!-- Menu fixo -->
    <style>

        /* Cabeçalho */
        header {
            width: 100%;
            background: #0A0A0A;

            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            border-bottom: 1px solid #222;
        }

        header nav {
            max-width: 1000px;
            margin: auto;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        header nav a {
            color: #fff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 600;
            transition: 0.2s;
        }

        header nav a:hover {
            color: #FFD700;
        }

        /* Espaço para não esconder o conteúdo */
        .top-offset {
            margin-top: 80px;
        }
