<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ZLPix Premiado</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0b0b0b;
            font-family: Arial, Helvetica, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 360px;
            background: #111;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px #00ffbb88;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #00ffbb;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #222;
            color: #fff;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #00ffbb;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }

        button:hover {
            background: #00e6aa;
        }

        .link {
            margin-top: 15px;
            display: block;
            color: #00ffbb;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Entrar</h2>

        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="senha" placeholder="Senha" />

        <button onclick="fazerLogin()">Login</button>

        <a class="link" href="cadastro.html">Criar conta</a>
        <a class="link" href="index.html">Voltar ao início</a>
    </div>

    <!-- ============================= -->
    <!--   SCRIPT DO LOGIN FICA AQUI   -->
    <!-- ============================= -->
    <script>
        function fazerLogin() {
            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value.trim();

            if (email === "" || senha === "") {
                alert("Preencha todos os campos!");
                return;
            }

            // Simulação de login (futuramente será conectado ao backend)
            if (email === "admin@teste.com" && senha === "1234") {
                alert("Login realizado!");
                window.location.href = "resultados.html";
            } else {
                alert("Email ou senha incorretos!");
            }
        }
    </script>

</body>
</html>
