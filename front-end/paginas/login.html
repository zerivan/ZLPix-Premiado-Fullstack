<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZLPIX PREMIADO - Login</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#00C853",
            accent: "#FFD700",
            "background-light": "#F5F5F5",
            "background-dark": "#111122",
            "text-dark-primary": "#212121",
            "text-light-primary": "#FFFFFF"
          },
          fontFamily: {
            display: ["Spline Sans", "sans-serif"]
          }
        }
      }
    }
  </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display flex flex-col items-center justify-center min-h-screen p-6">
  <div class="bg-card-light dark:bg-card-dark shadow-md rounded-2xl p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center text-primary mb-6">Entrar na Conta</h1>

    <form class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-text-dark-primary dark:text-text-light-primary mb-1">
          E-mail
        </label>
        <input type="email" placeholder="seuemail@exemplo.com"
               class="w-full rounded-full border-none bg-black/5 dark:bg-white/10 px-4 py-3 text-text-dark-primary dark:text-text-light-primary focus:ring-2 focus:ring-primary focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-text-dark-primary dark:text-text-light-primary mb-1">
          Senha
        </label>
        <input type="password" placeholder="********"
               class="w-full rounded-full border-none bg-black/5 dark:bg-white/10 px-4 py-3 text-text-dark-primary dark:text-text-light-primary focus:ring-2 focus:ring-primary focus:outline-none">
      </div>

      <button type="submit"
              class="mt-4 w-full bg-primary text-white font-bold py-3 rounded-full hover:bg-green-600 transition">
        Entrar
      </button>
    </form>

    <p class="text-center text-sm text-text-dark-secondary dark:text-text-light-secondary mt-6">
      Não tem uma conta?
      <a href="cadastro.html" class="text-primary font-semibold hover:underline">Cadastre-se</a>
    </p>

    <p class="text-center text-sm text-text-dark-secondary dark:text-text-light-secondary mt-4">
      <a href="../index.html" class="flex items-center justify-center gap-1 text-primary hover:underline">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        Voltar ao início
      </a>
    </p>
  </div>
</body>
</html>
