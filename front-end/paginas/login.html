<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ZLPix Premiado</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Config Tailwind -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#00C853",
            accent: "#FFD700",
            "background-dark": "#111122",
            "card-dark": "#191933"
          },
          fontFamily: { display: ["Spline Sans", "sans-serif"] },
          borderRadius: { xl: "1rem" }
        }
      }
    }
  </script>

  <style>
    body {
      min-height: 100vh;
      font-family: "Spline Sans", sans-serif;
    }
  </style>
</head>

<body class="bg-background-dark text-white flex items-center justify-center px-6">

  <!-- CARD DO LOGIN -->
  <div class="w-full max-w-sm bg-card-dark p-8 rounded-xl shadow-lg shadow-primary/20">

    <h1 class="text-2xl font-bold text-primary text-center mb-6">
      Painel Administrativo
    </h1>

    <!-- CAMPO DE EMAIL -->
    <div class="mb-4">
      <label class="text-sm text-slate-300">Email</label>
      <input id="email"
             type="email"
             class="w-full mt-1 p-3 rounded-lg bg-[#232348] text-white border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none"
             placeholder="admin@zl.com">
    </div>

    <!-- CAMPO DE SENHA -->
    <div class="mb-6">
      <label class="text-sm text-slate-300">Senha</label>
      <input id="senha"
             type="password"
             class="w-full mt-1 p-3 rounded-lg bg-[#232348] text-white border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none"
             placeholder="••••••••">
    </div>

    <!-- BOTÃO DE LOGIN -->
    <button onclick="fazerLogin()"
            class="w-full py-3 bg-primary text-black font-bold rounded-lg hover:bg-emerald-400 transition">
      Entrar
    </button>

    <!-- LINKS -->
    <div class="mt-6 text-center space-y-2">
      <a href="index.html" class="text-primary hover:underline">Voltar ao início</a>
    </div>

  </div>

  <!-- ----------------------------- -->
  <!--   SCRIPT DO LOGIN AQUI       -->
  <!-- ----------------------------- -->
  <script>
    function fazerLogin() {
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      if (email === "" || senha === "") {
        alert("Preencha todos os campos!");
        return;
      }

      // -------------------------------
      // LOGIN DO ADMIN
      // -------------------------------
      if (email === "admin@zl.com" && senha === "1234") {
        alert("Login de administrador realizado!");
        window.location.href = "admin.html"; // painel admin
        return;
      }

      // LOGIN DO USUÁRIO (futuro backend)
      alert("Email ou senha incorretos!");
    }
  </script>

</body>
</html>
