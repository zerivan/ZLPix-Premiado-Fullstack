<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pagamento - ZLPIX</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header>
    <a href="../paginas/selecao.html">← Voltar</a>
    <h1>Pagamento Pix</h1>
  </header>

  <main class="container">
    <!-- Tela QR -->
    <section id="screen-qr">
      <h2>Resumo do pedido</h2>
      <div id="ticket-summary"></div>
      <div class="qr-box">
        <img src="../assets/imgs/qr-placeholder.png" alt="QR Code" />
      </div>
      <p>Tempo restante: <span id="timer">10:00</span></p>
      <button id="copiar">Copiar Chave</button>
      <button id="ja-paguei" class="primary">Já paguei, confirmar</button>
    </section>

    <!-- Tela Confirmação (inicialmente escondida) -->
    <section id="screen-confirm" style="display:none">
      <div class="success">
        <h2>Pagamento confirmado</h2>
        <p>Bilhete gerado com sucesso!</p>
        <p>Nº do bilhete: <span id="ticket-id"></span></p>
      </div>
      <a href="../index.html" class="btn">Voltar ao Início</a>
      <a href="../paginas/bilhetes.html" class="btn">Meus Bilhetes</a>
    </section>
  </main>

  <script>
  // script simples para alternar telas e preencher dados do bilhete
  const pending = JSON.parse(localStorage.getItem('pending_ticket')||'null');
  const summaryEl = document.getElementById('ticket-summary');
  const screenQR = document.getElementById('screen-qr');
  const screenConfirm = document.getElementById('screen-confirm');
  const ticketIdEl = document.getElementById('ticket-id');

  if (!pending) {
    summaryEl.innerHTML = '<p>Nenhum bilhete encontrado. Volte e selecione suas dezenas.</p>';
    document.getElementById('ja-paguei').disabled = true;
  } else {
    summaryEl.innerHTML = `<p>Dezenas: ${pending.numbers.join(', ')}</p><p>Valor: R$ ${pending.value.toFixed(2)}</p>`;
  }

  document.getElementById('ja-paguei').onclick = () => {
    // Simular confirmação: gerar id e mostrar tela de confirmação
    const id = 'ZLPIX-'+Date.now().toString().slice(-6);
    ticketIdEl.textContent = id;
    // limpar pending e salvar em bilhetes
    const storage = JSON.parse(localStorage.getItem('my_tickets')||'[]');
    storage.push({...pending, id, createdAt: new Date().toISOString()});
    localStorage.setItem('my_tickets', JSON.stringify(storage));
    localStorage.removeItem('pending_ticket');
    screenQR.style.display='none';
    screenConfirm.style.display='block';
  };

  document.getElementById('copiar').onclick = () => {
    navigator.clipboard?.writeText('CHAVE_PIX_EXEMPLO_000').then(()=> alert('Chave copiada!'));
  };
  </script>
</body>
</html>
