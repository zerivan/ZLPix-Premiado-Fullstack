<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sorteio com Som</title>
<style>
  body { font-family: Arial; background:#111; color:#fff; text-align:center; }
  #painel { display:flex; justify-content:center; gap:20px; margin-top:30px; }
  .dezena { width:80px; height:80px; background:#222; border-radius:10px; display:flex; justify-content:center; align-items:center; font-size:2rem; box-shadow:0 0 10px #0f0; }
  button { margin-top:30px; padding:15px 25px; font-size:1.2rem; border:none; border-radius:8px; cursor:pointer; background:#0a0; color:#fff; }
</style>
</head>
<body>
<h1>Sorteio</h1>
<h2 id="top-dezenas">-- / -- / --</h2><div id="painel">
  <div class="dezena" id="d1">--</div>
  <div class="dezena" id="d2">--</div>
  <div class="dezena" id="d3">--</div>
</div><button onclick="sortear()">Sortear</button>

<audio id="somClick" src="click.mp3"></audio> <audio id="somSorteio" src="sorteio.mp3"></audio> <audio id="somFinal" src="final.mp3"></audio>

<script>
function gerarDezena() {
  let n = Math.floor(Math.random() * 100);
  return n.toString().padStart(2, '0');
}

function tocar(id) {
  document.getElementById(id).currentTime = 0;
  document.getElementById(id).play();
}

function sortear() {
  tocar('somClick');

  const d1 = gerarDezena();
  const d2 = gerarDezena();
  const d3 = gerarDezena();

  document.getElementById('somSorteio').play();

  setTimeout(() => {
    document.getElementById('d1').textContent = d1;
    document.getElementById('d2').textContent = d2;
    document.getElementById('d3').textContent = d3;
    document.getElementById('top-dezenas').textContent = `${d1} / ${d2} / ${d3}`;
    tocar('somFinal');
  }, 1500);
}
</script></body>
</html>
