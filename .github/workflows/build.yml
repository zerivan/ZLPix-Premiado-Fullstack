name: Build and Test ZLPix Premiado

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repositório
        uses: actions/checkout@v4

      - name: 🟢 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # BACKEND
      - name: ⚙️ Instalar dependências do backend
        working-directory: ./zlpix-premiado-backend
        run: |
          npm install
          npx prisma generate || echo "Sem Prisma"

      - name: 🏗️ Build backend
        working-directory: ./zlpix-premiado-backend
        run: npm run build || echo "Sem build script"

      # FRONTEND
      - name: ⚙️ Instalar dependências do frontend
        working-directory: ./zlpix-premiado-frontend
        run: npm install

      - name: 🧱 Build frontend
        working-directory: ./zlpix-premiado-frontend
        run: npm run build
