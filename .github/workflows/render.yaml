services:
  - type: web
    name: zlpix-backend
    env: node
    rootDir: zlpix-premiado-backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: static
    name: zlpix-frontend
    rootDir: zlpix-premiado-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://zlpix-backend.onrender.com
