services:
  - type: web
    name: zlpix-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: |
      npm install --include=dev && npm run build
    startCommand: |
      npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
    autoDeploy: true
    branch: main
    envSpecific:
      build:
        DATABASE_URL:
          sync: true
          required: true
          description: "URL de conexão do banco PostgreSQL (NeonDB ou outro)"