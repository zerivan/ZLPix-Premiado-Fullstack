services:
  # 🔵 BACKEND (Node + Express + Prisma)
  - type: web
    name: zlpix-premiado-backend
    rootDir: backend
    env: node
    plan: free
    buildCommand: |
      echo "📦 Instalando todas as dependências (inclusive dev)..."
      npm ci --include=dev
      echo "⚙️ Gerando Prisma Client..."
      npx prisma generate
      echo "🏗️ Compilando TypeScript..."
      npx tsc --project tsconfig.build.json
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: NODE_ENV
        value: production
      - key: PIX_KEY
        value: teste@pix.com.br

  # 🟠 FRONTEND (React + Vite)
  - type: static
    name: zlpix-premiado-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
