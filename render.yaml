services:
  # === BACKEND ===
  - type: web
    name: zlpix-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node dist/server.js
    envVars:
      - key: NODE_VERSION
        value: 20
    plan: free
    autoDeploy: true

  # === FRONTEND ===
  - type: web
    name: zlpix-frontend
    env: static
    rootDir: front-end
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /.*
        destination: /index.html
