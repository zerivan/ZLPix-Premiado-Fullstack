services:
  - type: web
    name: zlpix-backend
    env: node
    region: oregon
    rootDir: backend
    buildCommand: |
      echo "🧹 Limpando migrações antigas..."
      rm -rf prisma/migrations

      echo "🛠️ Resetando e sincronizando banco de dados..."
      npx prisma migrate reset --force
      npx prisma db push
      npx prisma generate

      echo "📦 Instalando dependências e buildando projeto..."
      npm install
      npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0