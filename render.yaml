services:
  - type: web
    name: zlpix-premiado-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: |
      cd backend
      echo "📦 Instalando dependências..."
      npm install
      echo "📦 Instalando Prisma e client..."
      npm install @prisma/client prisma
      echo "⚙️ Gerando Prisma Client..."
      npx prisma generate
      echo "🏗️ Compilando TypeScript..."
      npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: NODE_ENV
        value: production
      - key: PIX_KEY
        value: teste@pix.com.br
