services:
  # ============================
  # 🚀 BACKEND (API EXPRESS)
  # ============================
  - name: zlpix-backend
    type: web
    env: node
    rootDir: backend
    plan: free

    buildCommand: |
      npm install
      npx prisma generate
      npm run build

    startCommand: |
      node dist/server.js

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_VERSION
        value: 20

    autoDeploy: true
    branch: main

  # ============================
  # 🌐 FRONT-END (REACT + VITE)
  # ============================
  - name: zlpix-site
    type: web
    env: static
    rootDir: front-end
    plan: free

    buildCommand: |
      npm install
      npm run build

    staticPublishPath: dist

    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

    autoDeploy: true
    branch: main