services:
  # 🔵 BACKEND (Node + Express + Prisma)
  - type: web
    name: zlpix-premiado-backend
    rootDir: backend
    env: node
    plan: free
    buildCommand: |
      echo "🚀 Iniciando deploy automatizado..."
      chmod +x fix-deploy.sh || true
      ./fix-deploy.sh || (
        echo "⚙️ Rodando fallback manual..."
        rm -rf dist node_modules
        npm cache clean --force
        npm install --production=false
        npx prisma generate
        npm run build
      )
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: NODE_ENV
        value: production
      - key: PIX_KEY
        value: teste@pix.com.br

  # 🟠 FRONTEND (React + Vite)
  - type: static
    name: zlpix-premiado-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist