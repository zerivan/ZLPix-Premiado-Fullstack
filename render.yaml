services:
  # ====================================
  # BACKEND
  # ====================================
  - type: web
    name: zlpix-backend
    env: node
    rootDir: backend
    plan: free

    buildCommand: |
      npm install
      npx prisma generate
      npm run build

    startCommand: |
      node dist/server.js

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_VERSION
        value: 18.20.2
      - key: PORT
        value: 10000

    autoDeploy: true
    branch: main

  # ====================================
  # FRONTEND
  # ====================================
  - type: static
    name: zlpix-site
    rootDir: front-end

    buildCommand: |
      npm install
      npm run build

    staticPublishPath: dist

    envVars:
      - key: NODE_VERSION
        value: 18.20.2

      - key: VITE_API_URL
        fromService:
          name: zlpix-backend
          type: web
          property: url

    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

    autoDeploy: true
    branch: main