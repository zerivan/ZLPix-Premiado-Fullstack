services:
  - type: web
    name: zlpix-premiado-backend
    rootDir: backend
    env: node
    plan: free
    buildCommand: |
      echo "📦 Limpando cache e instalando dependências..."
      rm -rf node_modules package-lock.json
      npm install
      echo "📘 Instalando tipos Node e Express..."
      npm install --save-dev typescript @types/node @types/express @types/cors @types/qrcode
      echo "⚙️ Gerando Prisma Client..."
      npx prisma generate
      echo "🏗️ Compilando TypeScript..."
      npx tsc -p tsconfig.build.json
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: NODE_ENV
        value: production
      - key: PIX_KEY
        value: teste@pix.com.br

  # 🟠 FRONTEND (React + Vite)
  - type: static
    name: zlpix-premiado-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
