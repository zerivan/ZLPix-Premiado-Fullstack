services:
  # === BACKEND ===
  - type: web
    name: zlpix-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_VERSION
        value: 18.19.0
      - key: PORT
        value: 10000
    plan: free
    autoDeploy: true
    routes:
      - type: rewrite
        source: /.*
        destination: /  # NÃO usa subpasta aqui

  # === FRONTEND ===
  - type: web
    name: zlpix-frontend
    env: static
    rootDir: front-end
    staticPublishPath: dist   # ← IMPORTANTE
    autoDeploy: true
    routes:
      - type: rewrite
        source: /(.*)
        destination: /$1