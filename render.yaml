services:
  - type: web
    name: zlpix-backend
    env: node
    region: oregon
    rootDir: backend
    buildCommand: |
      echo "🚀 Forçando sincronização do Prisma com o banco..."
      npx prisma db push --accept-data-loss
      npx prisma generate
      echo "📦 Instalando dependências..."
      npm install
      echo "⚙️  Buildando o backend..."
      npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0