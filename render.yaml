name: Build ZLPix Premiado Fullstack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    # 1️⃣ Checkout do repositório
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Configuração do Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    # 3️⃣ Build do Backend
    - name: Build Backend (Node + Express + Prisma)
      working-directory: ./zlpix-premiado-backend
      run: |
        echo "📦 Instalando dependências do backend..."
        npm install
        echo "🏗️ Compilando backend..."
        npm run build || echo "⚠️ Nenhum comando build configurado, ignorando..."
        echo "✅ Backend finalizado!"

    # 4️⃣ Build do Frontend
    - name: Build Frontend (React + Vite)
      working-directory: ./zlpix-premiado-frontend
      run: |
        echo "📦 Instalando dependências do frontend..."
        npm install
        echo "🏗️ Compilando frontend..."
        npm run build || echo "⚠️ Build padrão executado."
        echo "✅ Frontend finalizado!"

    # 5️⃣ Confirmação final
    - name: Build concluído
      run: echo "🎉 ZLPix Premiado Fullstack compilado com sucesso!"
