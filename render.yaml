services:
  # === BACKEND ===
  - type: web
    name: zlpix-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.19.0
      - key: PORT
        value: 10000
    plan: free
    autoDeploy: true

  # === FRONTEND ===
  - type: web
    name: zlpix-frontend
    env: static
    rootDir: front-end
    staticPublishPath: "."
    autoDeploy: true
    routes:
      - src: "/(.*)"
        dest: "/$1"