services:
  - type: web
    name: zlpix-premiado-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: |
      echo "📦 Instalando dependências..."
      npm install
      echo "⚙️ Instalando Prisma e gerando client..."
      npm install @prisma/client prisma
      npx prisma generate
      echo "🏗️ Compilando TypeScript..."
      npm run build
    startCommand: |
      echo "🚀 Iniciando servidor backend..."
      npm start                                                 envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: NODE_ENV
        value: production
      - key: PIX_KEY
        value: teste@pix.com.br
