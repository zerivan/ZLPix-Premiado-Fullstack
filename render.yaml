services:
  - type: web
    name: zlpix-backend
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma migrate dev --name add-pixkey --create-only --skip-seed && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0