services:
  - type: web
    name: zlpix-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://fallback_user:fallback_password@localhost:5432/fallbackdb?sslmode=disable
        sync: false