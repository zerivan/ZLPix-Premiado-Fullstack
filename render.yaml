services:
  - type: web
    name: zlpix-premiado-backend
    rootDir: backend
    env: node
    plan: free
    buildCommand: |
      npm install
      npx prisma generate
      npx tsc -p tsconfig.build.json
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: NODE_ENV
        value: production
      - key: PIX_KEY
        value: teste@pix.com.br
