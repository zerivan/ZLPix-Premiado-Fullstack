services:
  # === BACKEND ===
  - type: web
    name: zlpix-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.19.0
      - key: PORT
        value: 10000
    plan: free
    autoDeploy: true

  # === FRONTEND ===
  - type: web
    name: zlpix-frontend
    env: node
    rootDir: front-end
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: NODE_VERSION
        value: 18.19.0
      - key: VITE_API_URL
        value: https://zlpix-backend.onrender.com
    plan: free
    autoDeploy: true