services:
  - type: web
    name: zlpix-backend
    env: node
    rootDir: backend
    plan: free

    buildCommand: |
      npm install
      npm run build

    startCommand: |
      npm run start

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: 22.16.0
      - key: PORT
        value: 10000

    autoDeploy: true
    branch: main
    envSpecific:
      build:
        DATABASE_URL:
          sync: true
          required: true
          description: "URL de conexão do banco PostgreSQL (NeonDB ou outro)"
